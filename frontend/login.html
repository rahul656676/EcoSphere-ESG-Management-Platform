<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EcoSphere - Login</title>
<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  body { display:flex; align-items:center; justify-content:center; height:100vh; background:var(--bg); margin:0; font-family:var(--font); color:var(--text-primary); }
  .login-box { background:var(--card-bg); padding:40px; border-radius:16px; width:400px; box-shadow:0 12px 40px rgba(0,0,0,0.5); border:1px solid var(--border); }
  .login-box h1 { color:var(--primary); font-size:24px; margin:0 0 8px; display:flex; align-items:center; gap:8px; justify-content:center; }
  .login-box p.sub { color:var(--text-secondary); font-size:14px; margin:0 0 32px; text-align:center; }
  .hint { font-size:13px; color:var(--text-muted); margin-top:24px; text-align:center; padding-top:16px; border-top:1px solid var(--border); }
  #err { color:var(--error); font-size:13px; margin-top:12px; display:none; text-align:center; padding:10px; background:rgba(239, 68, 68, 0.1); border-radius:6px; }
</style>
</head>
<body>
  <div class="login-box slide-up">
    <h1><i data-lucide="leaf" class="icon" style="width:24px;height:24px;color:var(--primary)"></i> EcoSphere AI</h1>
    <p class="sub">Enterprise ESG Management Platform</p>
    <form id="loginForm">
      <div class="form-group">
        <label class="form-label">Username</label>
        <div style="position:relative">
          <i data-lucide="user" class="icon" style="position:absolute; left:12px; top:10px; color:var(--text-muted); width:18px;height:18px"></i>
          <input class="form-control" type="text" id="username" value="admin" style="padding-left:38px" required>
        </div>
      </div>
      <div class="form-group mb-4">
        <label class="form-label">Password</label>
        <div style="position:relative">
          <i data-lucide="lock" class="icon" style="position:absolute; left:12px; top:10px; color:var(--text-muted); width:18px;height:18px"></i>
          <input class="form-control" type="password" id="password" value="admin123" style="padding-left:38px" required>
        </div>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%; padding:12px; font-size:15px; border-radius:8px">Log In to ERP</button>
      <div id="err"></div>
    </form>
    <div class="hint">Default credentials: <b style="color:var(--text-primary)">admin / admin123</b></div>
  </div>

<script>
lucide.createIcons();
document.getElementById("loginForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;
  const errEl = document.getElementById("err");
  errEl.style.display = "none";
  try {
    const res = await fetch("/api/auth/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (data.success) {
      window.location.href = "dashboard.html";
    } else {
      errEl.innerHTML = `<i data-lucide="alert-circle" class="icon" style="width:14px;height:14px;vertical-align:middle;margin-right:4px"></i> ` + (data.error || "Login failed");
      errEl.style.display = "block";
      lucide.createIcons();
    }
  } catch (err) {
    errEl.innerHTML = `<i data-lucide="alert-circle" class="icon" style="width:14px;height:14px;vertical-align:middle;margin-right:4px"></i> Could not reach server.`;
    errEl.style.display = "block";
    lucide.createIcons();
  }
})
</script>
</body>
</html>
