<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EcoSphere - Login</title>
<link rel="stylesheet" href="style.css">
<style>
  body { display:flex; align-items:center; justify-content:center; height:100vh; background:linear-gradient(135deg,#1e9e50 0%,#0d3b66 100%); }
  .login-box { background:#fff; padding:36px 34px; border-radius:12px; width:360px; box-shadow:0 12px 40px rgba(0,0,0,.25); }
  .login-box h1 { color:#1e9e50; font-size:22px; margin:0 0 4px; }
  .login-box p.sub { color:#6b7280; font-size:13px; margin:0 0 22px; }
  .login-box .form-row { margin-bottom:14px; }
  .hint { font-size:12px; color:#6b7280; margin-top:14px; text-align:center; }
  #err { color:#d0342c; font-size:13px; margin-top:8px; display:none; }
</style>
</head>
<body>
  <div class="login-box">
    <h1>🌿 EcoSphere</h1>
    <p class="sub">ESG Management Platform</p>
    <form id="loginForm">
      <div class="form-row">
        <label>Username</label>
        <input type="text" id="username" value="admin" required>
      </div>
      <div class="form-row">
        <label>Password</label>
        <input type="password" id="password" value="admin123" required>
      </div>
      <button type="submit" class="btn btn-green" style="width:100%;">Log In</button>
      <div id="err"></div>
    </form>
    <div class="hint">Default credentials: <b>admin / admin123</b></div>
  </div>

<script>
document.getElementById("loginForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;
  const errEl = document.getElementById("err");
  errEl.style.display = "none";
  try {
    const res = await fetch("/api/auth/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (data.success) {
      window.location.href = "dashboard.html";
    } else {
      errEl.textContent = data.error || "Login failed";
      errEl.style.display = "block";
    }
  } catch (err) {
    errEl.textContent = "Could not reach server.";
    errEl.style.display = "block";
  }
});
</script>
</body>
</html>
